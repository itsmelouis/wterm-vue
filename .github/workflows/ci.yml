name: CI

on:
  push:
    branches: [main]
    paths:
      - packages/wterm-vue/**
      - eslint.config.ts
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/ci.yml
  pull_request:
    paths:
      - packages/wterm-vue/**
      - eslint.config.ts
      - package.json
      - pnpm-lock.yaml
      - .github/workflows/ci.yml

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Type Check
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check
